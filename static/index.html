<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Router Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            min-height: 0;
        }
        
        .message {
            margin-bottom: 15px;
            padding: 12px;
            border-radius: 10px;
            max-width: 85%;
            word-wrap: break-word;
        }
        
        .user-message {
            background: #2b5278;
            margin-left: auto;
            text-align: right;
        }
        
        .ai-message {
            background: #3a3a3a;
            margin-right: auto;
            font-size: 14px;
        }
        
        .input-container {
            background: #2d2d2d;
            padding: 15px;
            border-top: 1px solid #444;
            display: flex;
            gap: 10px;
        }
        
        #user-input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 20px;
            background: #3a3a3a;
            color: #fff;
            font-size: 16px;
        }
        
        #user-input::placeholder {
            color: #888;
        }
        
        #send-btn {
            padding: 10px 16px;
            border: none;
            border-radius: 20px;
            background: #4CAF50;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
        }
        
        #send-btn:disabled {
            background: #666;
        }
        
        .loading {
            text-align: center;
            color: #888;
            padding: 10px;
        }
        
        .error {
            color: #f44336;
            text-align: center;
            padding: 10px;
        }
        
        .debug-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
            border-top: 1px solid #444;
            padding-top: 5px;
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chat-container">
        <div class="message ai-message">
            <b>사용 가능한 명령어:</b><br>
            - "로그 보여줘" - 시스템 로그 확인<br>
            - "시스템 상태" - 시스템 상태 확인<br>
            - "웹검색 검색어" - 웹 검색<br>
            - "음악 검색어" - 음악 검색<br>
        </div>
    </div>
    
    <div class="input-container">
        <input type="text" id="user-input" placeholder="메시지를 입력하세요..." autocomplete="off">
        <button id="send-btn" onclick="sendMessage()">전송</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        
        // Enter 키로 전송
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            // 사용자 메시지 추가
            addMessage(message, 'user');
            userInput.value = '';
            
            // 로딩 표시
            sendBtn.disabled = true;
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.textContent = '처리 중...';
            chatContainer.appendChild(loadingDiv);
            scrollToBottom();
            
            try {
                let data;
                
                // 음악 검색 처리
                if (message.startsWith('음악 ')) {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    
                    const query = message.substring(3);
                    const response = await fetch('/api/music/search', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({query: query, limit: 5}),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    data = await response.json();
                }
                // 로그 확인 처리
                else if (message === '로그 보여줘' || message === '시스템 로그보여줘' || message === '시스템 로그 확인') {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    
                    const response = await fetch('/api/system/logs', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    data = await response.json();
                }
                // 시스템 상태 처리
                else if (message === '시스템 상태' || message === '시스템 상태확인' || message === '시스템 상태 확인') {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 60000);
                    
                    const response = await fetch('/api/system/status', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);
                    data = await response.json();
                }
                // 일반 AI 처리
                else {
                    // 타임아웃 설정 (180초)
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 180000);
                    
                    // API 호출
                    const response = await fetch('/api/run', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({data: message}),
                        signal: controller.signal
                    });
                    
                    clearTimeout(timeoutId);
                    
                    data = await response.json();
                }
                
                // 로딩 제거
                loadingDiv.remove();
                
                // 응답 추가
                if (data.status === 'success') {
                    let responseText;
                    
                    // 음악 검색 결과 표시
                    if (data.type === 'music' && data.result.tracks) {
                        responseText = '🎵 음악 검색 결과:<br><br>';
                        data.result.tracks.forEach((track, index) => {
                            const videoId = track.url.split('v=')[1]?.split('&')[0] || '';
                            responseText += `${index + 1}. ${track.title}<br>`;
                            responseText += `   길이: ${Math.floor(track.duration / 60)}분 ${Math.floor(track.duration % 60)}초<br>`;
                            if (videoId) {
                                responseText += `   <iframe width="300" height="170" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe><br><br>`;
                            } else {
                                responseText += `   <a href="${track.url}" target="_blank" style="color: #4CAF50;">YouTube에서 보기</a><br><br>`;
                            }
                        });
                    }
                    // 시스템 로그 결과 표시
                    else if (data.type === 'log') {
                        responseText = '📋 시스템 로그:<br><br>';
                        if (data.logs && data.logs.length > 0) {
                            data.logs.forEach(log => {
                                responseText += `<b>${log.file}</b><br>`;
                                responseText += `${log.content}<br><br>`;
                            });
                        } else {
                            responseText = '로그 파일이 없습니다.';
                        }
                    }
                    // 시스템 상태 결과 표시
                    else if (data.type === 'system') {
                        responseText = '⚙️ 시스템 상태:<br><br>';
                        responseText += `CPU 사용량: ${data.cpu.usage}%<br>`;
                        responseText += `메모리: ${data.memory.percent}% 사용 (${Math.round(data.memory.used / 1024 / 1024 / 1024)}GB / ${Math.round(data.memory.total / 1024 / 1024 / 1024)}GB)<br>`;
                        responseText += `디스크: ${data.disk.percent}% 사용 (${Math.round(data.disk.used / 1024 / 1024 / 1024)}GB / ${Math.round(data.disk.total / 1024 / 1024 / 1024)}GB)<br>`;
                    }
                    // 일반 AI 응답
                    else {
                        responseText = data.result;
                        
                        // 디버그 정보 추가 (선택적)
                        if (data.winner || data.intent) {
                            responseText += '<div class="debug-info">';
                            if (data.winner) responseText += `Winner: ${data.winner} | `;
                            if (data.intent) responseText += `Intent: ${data.intent.type}`;
                            responseText += '</div>';
                        }
                    }
                    
                    addMessage(responseText, 'ai');
                } else {
                    addMessage('오류가 발생했습니다.', 'ai', true);
                }
            } catch (error) {
                loadingDiv.remove();
                addMessage('서버 연결 오류: ' + error.message, 'ai', true);
            }
            
            sendBtn.disabled = false;
            userInput.focus();
        }
        
        function addMessage(text, sender, isError = false) {
            const div = document.createElement('div');
            div.className = `message ${sender}-message ${isError ? 'error' : ''}`;
            div.innerHTML = text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }
        
        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
